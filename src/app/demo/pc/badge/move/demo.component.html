<!-- ignore the following lines, they are not important to this demo -->
<jigsaw-demo-description [summary]="summary" [content]="description">
</jigsaw-demo-description>


<!-- start to learn the demo from here -->
<span>X</span>
<jigsaw-slider min="50" max="400" value="100" width="200px"
               (valueChange)="move($event, 'hor')">
</jigsaw-slider>

<span>Y</span>
<jigsaw-slider min="50" max="400" value="100" width="200px"
               (valueChange)="move($event, 'ver')">
</jigsaw-slider>

<span>Optical</span>
<jigsaw-slider min="0" max="1" value="1" step="0.1" width="100px"
               (valueChange)="setOpacity($event)">
</jigsaw-slider>

<button #target j-movable j-badge jigsawBadgeValue="dot" class="movable">
    Drag and move me!
</button>
